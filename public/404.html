<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown GitHub Pages routes back to index.html while preserving the SPA path.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var redirectPath = l.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');
      var routePath = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
      var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';

      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + redirectPath + '/?/' + routePath + query + l.hash);
    </script>
  </head>
  <body></body>
</html>
